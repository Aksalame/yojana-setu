services:
  - type: cron
    name: yojana-setu-agent
    runtime: node
    plan: free
    schedule: "0 3 * * *"   # daily at 03:00 UTC ~= 8:30 AM IST — change as you like
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        value: main
